name: CI
on:
  push:
    tags-ignore:
      - 'qbox-agent-*'
  pull_request:
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r backend/requirements.txt
      - run: python -m compileall backend/qcentral agent/qbox_agent
      - run: bash -n scripts/*.sh
      - run: bash -n agent/*.sh
      - name: Create CI env for compose validation
        run: |
          cat > deploy/.env <<'EOF'
          POSTGRES_DB=qcentral
          POSTGRES_USER=qcentral
          POSTGRES_PASSWORD=ci-postgres-password
          Q_CENTRAL_HOSTNAME=localhost
          EOF
      - run: docker compose -f deploy/docker-compose.production.yml config

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd frontend && npm install && npm run build
