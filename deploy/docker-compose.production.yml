services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qcentral}
      POSTGRES_USER: ${POSTGRES_USER:-qcentral}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [qcentral]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qcentral} -d ${POSTGRES_DB:-qcentral}"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt: ["no-new-privileges:true"]

  api:
    build: ../backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - qcentral-data:/data
    networks: [qcentral]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp"]

  frontend:
    build: ../frontend
    restart: unless-stopped
    networks: [qcentral]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101,mode=1777
      - /var/run:uid=101,gid=101,mode=1777
      - /tmp:uid=101,gid=101,mode=1777

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [qcentral]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]

networks:
  qcentral:
    driver: bridge

volumes:
  qcentral-data:
  postgres-data:
  caddy-data:
  caddy-config:
