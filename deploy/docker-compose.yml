services:
  api:
    build: ../backend
    container_name: q-central-api
    env_file: .env
    volumes:
      - qcentral-data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build: ../frontend
    container_name: q-central-web
    environment:
      VITE_API_URL: ${Q_CENTRAL_EXTERNAL_URL:-http://localhost:8080}
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  qcentral-data:
